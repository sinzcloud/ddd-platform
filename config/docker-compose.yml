version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ddd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: ddd_platform
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ddd-network

  redis:
    image: redis:7-alpine
    container_name: ddd-redis
    ports:
      - "6379:6379"
    networks:
      - ddd-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ddd-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ddd-network

  app:
    build: ..
    container_name: ddd-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
      - rabbitmq
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ddd_platform?useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
    networks:
      - ddd-network

networks:
  ddd-network:
    driver: bridge

volumes:
  mysql-data: