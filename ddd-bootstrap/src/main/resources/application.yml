spring:
  application:
    name: ddd-platform

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ddd_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true
    username: root
    password: 123456
    hikari:
      # 确保自动提交
      auto-commit: true
      # 最小空闲连接数
      minimum-idle: 5
      # 最大连接数
      maximum-pool-size: 20
      # 连接超时时间
      connection-timeout: 30000
      # 空闲超时时间
      idle-timeout: 600000
      # 连接最大生命周期
      max-lifetime: 1800000
      # 连接测试查询
      connection-test-query: SELECT 1

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    connection-timeout: 5000ms
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true

mybatis-plus:
  configuration:
    # 开启 SQL 日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 开启驼峰命名
    map-underscore-to-camel-case: true
    # 开启缓存
    cache-enabled: false
    # 开启懒加载
    lazy-loading-enabled: true
    # 开启积极懒加载
    aggressive-lazy-loading: false
  global-config:
    db-config:
      # 逻辑删除全局配置
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 主键类型
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.ddd.platform.infrastructure.po

jwt:
  secret: ddd-platform-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration: 86400000

logging:
  level:
    com.ddd.platform: DEBUG
    org.springframework.security: DEBUG
    # 打印 SQL 日志
    com.ddd.platform.infrastructure.mapper: DEBUG
    # 打印 MyBatis 日志
    com.baomidou.mybatisplus: DEBUG

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ddd-platform